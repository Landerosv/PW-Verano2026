<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <style>
        body{
    background-color: lightgray;
    margin: 0;
}

.contenedor{
    display: flex;
    justify-content: center; /* Centra horizontalmente */
    align-items: center;     /* Centra verticalmente */
    gap: 100px;              /* Espacio entre texto y formulario */
    height: 100vh;
    font-family: Helvetica, Arial, sans-serif;
}
.login{
    background-color: white;
    width: 350px;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0px 2px 10px gray;
}

.login input{
    width: 100%;
    height: 45px;
    margin-bottom: 15px;
    border-radius: 6px;
    border: 1px solid lightgray;
    padding-left: 10px;
    box-sizing: border-box;
    font-size: 16px;
}

.btnAzul{
    background-color: #1877f2;
    color: white;
    border: none;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
}

.login a{
    display: block;
    text-align: center;
    text-decoration: none;
    margin-bottom: 15px;
    color: #1877f2;
}

.btnVerde{
    background-color: #42b72a;
    color: white;
    border: none;
    width: 200px;
    display: block;
    margin: auto;
    font-weight: bold;
    cursor: pointer;
} 
.textoInferior{
    text-align: center;
    margin-top: 25px;
    font-size: 14px;
}
    </style>
</head>
<body>
<div class="contenedor">
    <div>
        <h1 style="color: blue; font-size:45px;">Facebook</h1>

        <p style="font-size:22px;">
            Facebook te ayuda a comunicarte y<br>
            compartir con las personas que forman<br>
            parte de tu vida.
        </p>
    </div>
    <div>

        <div class="login">
            <form>
                <input type="email" placeholder="Correo electrónico o número de teléfono">

                <input type="password" placeholder="Contraseña">

                <input type="submit" value="Iniciar sesión" class="btnAzul">

                <a href="">¿Olvidaste tu contraseña?</a>

                <hr>

                <input type="button" value="Crear cuenta nueva" class="btnVerde">
            </form>
        </div>

        <p class="textoInferior">
            <strong>Crea una página</strong> para una celebridad, una marca o un negocio.
        </p>

    </div>
</div>
</body>
</html>
